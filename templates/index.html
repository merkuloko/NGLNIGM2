<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Send GM Anonymous Message</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1 class="page-title">Send me Anonymous Message here</h1>

        <form id="messageForm" method="post" action="/send">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="form-group">
                <textarea
                    name="message"
                    id="messageInput"
                    placeholder="Promise, anonymous talaga 'to.
- GM"
                    maxlength="{{ message_max_length }}"
                    required
                ></textarea>
            </div>

            <div class="form-meta">
                <span id="characterCount">0 / {{ message_max_length }}</span>
            </div>

            <button type="submit" id="submitBtn">
                <span>Click mo dito para ma-send</span>
            </button>
        </form>

        <div class="success-message" id="successMessage" hidden>
            Na-receive ko na. Basahin ko nalang laterrr.
            <div class="countdown" id="countdown"></div>
        </div>

        <p class="error-message" id="errorMessage" hidden></p>
    </div>

    <script>
        const form = document.getElementById('messageForm');
        const submitBtn = document.getElementById('submitBtn');
        const successMessage = document.getElementById('successMessage');
        const countdown = document.getElementById('countdown');
        const messageInput = document.getElementById('messageInput');
        const errorMessage = document.getElementById('errorMessage');
        const characterCount = document.getElementById('characterCount');

        function setButtonState(isSending) {
            submitBtn.disabled = isSending;
            submitBtn.innerHTML = isSending
                ? '<span>Sending...</span>'
                : '<span>Click mo dito para ma-send</span>';
        }

        function updateCharacterCount() {
            characterCount.textContent = `${messageInput.value.length} / ${messageInput.maxLength}`;
        }

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.hidden = false;
        }

        function startCountdown() {
            let seconds = 3;
            countdown.textContent = `Page will refresh in ${seconds} seconds...`;

            const interval = setInterval(() => {
                seconds -= 1;
                if (seconds > 0) {
                    countdown.textContent = `Page will refresh in ${seconds} seconds...`;
                    return;
                }

                clearInterval(interval);
                window.location.reload();
            }, 1000);
        }

        messageInput.addEventListener('input', updateCharacterCount);
        updateCharacterCount();

        form.addEventListener('submit', async function(event) {
            event.preventDefault();
            errorMessage.hidden = true;
            setButtonState(true);

            try {
                const response = await fetch(form.action, {
                    method: 'POST',
                    body: new FormData(form)
                });
                const data = await response.json();

                if (!response.ok || data.status !== 'success') {
                    showError(data.message || 'Could not send message right now.');
                    setButtonState(false);
                    return;
                }

                form.hidden = true;
                successMessage.hidden = false;
                startCountdown();
            } catch (error) {
                console.error('Error:', error);
                showError('Server error. Try mo ulit mamaya.');
                setButtonState(false);
            }
        });
    </script>
</body>
</html>
