<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Inbox</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <div class="admin-header">
            <div class="admin-title-block">
                <div class="icon">📥</div>
                <h1 class="centered-title">Inbox</h1>
            </div>

            <form method="post" action="{{ url_for('admin_logout') }}" class="admin-actions">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <button type="submit" class="secondary-button">Logout</button>
            </form>
        </div>

        {% if error %}
        <p class="error-message">{{ error }}</p>
        {% endif %}

        <div class="message-list">
            {% if messages %}
                {% for msg in messages %}
                <div class="message-item">
                    <p>{{ msg.get('content', 'No message') }}</p>
                    {% if msg.get('created_at') %}
                    <p class="message-meta">{{ msg.get('created_at') }}</p>
                    {% endif %}
                </div>
                {% endfor %}
            {% else %}
                <p class="no-messages">No messages yet. Send one to test.</p>
            {% endif %}
        </div>

        <a href="/" class="back-link">Back to Home</a>
    </div>
</body>
</html>
